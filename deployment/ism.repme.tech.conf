#
# VPS public reverse proxy — ism.repme.tech
#
# Traffic flow:
#   Browser → ism.repme.tech (VPS, nginx + SSL)
#     → Tailscale tunnel (100.121.93.93)
#       ├── /api/*   → FastAPI  :8000  (prediction, health, monitoring)
#       ├── /dask/*  → Dask     :8787  (cluster dashboard, demo only)
#       └── /*       → Streamlit :8501 (monitoring UI)
#
# Apply on VPS:
#   sudo cp ism.repme.tech.conf /etc/nginx/sites-available/ism.repme.tech
#   sudo ln -sf /etc/nginx/sites-available/ism.repme.tech /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#

upstream bigdata_api {
    server 100.121.93.93:8000;
    keepalive 16;
}

upstream bigdata_dashboard {
    server 100.121.93.93:8501;
    keepalive 16;
}

upstream dask_dashboard {
    server 100.121.93.93:8787;
    keepalive 8;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ism.repme.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ism.repme.tech;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/ism.repme.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ism.repme.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 4m;

    # ── FastAPI: /api/* → :8000 (strip /api prefix) ─────────────────
    # /api/health     → FastAPI /health
    # /api/predict    → FastAPI /predict
    # /api/docs       → FastAPI /docs
    # /api/ws/stream  → FastAPI /ws/stream (WebSocket)
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass http://bigdata_api/;    # trailing slash strips /api
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support (for /api/ws/stream)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # ── Dask dashboard: /dask/* → :8787 ─────────────────────────────
    # Demo only — shows Dask cluster task graph, workers, memory
    location /dask/ {
        proxy_pass http://dask_dashboard/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Streamlit dashboard: /* → :8501 ─────────────────────────────
    # Must come last — catches everything else
    location / {
        proxy_pass http://bigdata_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Streamlit requires WebSocket for /_stcore/stream
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;   # long timeout for WebSocket
        proxy_connect_timeout 5s;
        proxy_buffering off;         # required for Streamlit SSE
    }
}
