name: bigdata
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # Core Data Processing
  - dask=2024.1.0
  - distributed=2024.1.0
  - pandas=2.1.4
  - numpy=1.26.3
  - pyarrow=14.0.2
  # Machine Learning
  - scikit-learn=1.3.2
  - dask-ml=2023.3.24
  - xgboost=2.0.3
  - lightgbm=4.2.0
  - imbalanced-learn=0.11.0
  # Visualization
  - matplotlib=3.8.2
  - seaborn=0.13.1
  - plotly=5.18.0
  # Notebook
  - jupyterlab=4.0.10
  - ipywidgets=8.1.1
  - notebook
  # Utils
  - pyyaml
  - tqdm
  - pip
  - pip:
    - streamlit>=1.29.0
    - shap>=0.44.0
    - kaggle
